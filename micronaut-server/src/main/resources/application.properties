redis.uri=${REDIS_URL:redis://mcp-redis:6379}

# Redis connection pool (Lettuce): avoids 50 threads competing on a single connection
redis.pool.enabled=true
redis.pool.max-active=32
redis.pool.min-idle=8
redis.pool.max-idle=16

micronaut.mcp.server.transport=HTTP
micronaut.mcp.server.info.name=micronaut-mcp-benchmark
micronaut.mcp.server.info.version=1.0.0

# Endpoint MCP (default is /mcp, but we make it explicit)
micronaut.mcp.server.endpoint=/mcp

# HTTP client pool (Netty): match Go/Rust pool sizes
micronaut.http.client.pool.enabled=true
micronaut.http.client.pool.max-connections-per-host=100
micronaut.http.client.connection-pool-idle-timeout=90s

# Health
endpoints.health.enabled=true
endpoints.health.details-visible=ANONYMOUS
