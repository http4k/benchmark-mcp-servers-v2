spring.ai.mcp.server.protocol=STREAMABLE
spring.ai.mcp.server.type=SYNC
spring.ai.mcp.server.streamable-http.mcp-endpoint=/mcp
server.port=8080

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# Tomcat: enough threads for 50 VUs with headroom; reduce idle overhead
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=25
server.tomcat.accept-count=200
server.tomcat.connection-timeout=10000

# Redis
spring.data.redis.url=${REDIS_URL:redis://mcp-redis:6379}

# Lettuce connection pool (requires commons-pool2 on classpath)
# Avoids all 200 Tomcat threads contending on a single multiplexed connection
spring.data.redis.lettuce.pool.enabled=true
spring.data.redis.lettuce.pool.max-active=32
spring.data.redis.lettuce.pool.min-idle=8
spring.data.redis.lettuce.pool.max-idle=16
spring.data.redis.lettuce.pool.max-wait=5000ms
